# Builds the static site, injects CHECKOUT_ENDPOINT from GitHub Secrets into
# config.js (no Secret key in the browser), and deploys to GitHub Pages.
#
# Enable Pages: Settings → Pages → Source: GitHub Actions
#
# Secrets:
#   CHECKOUT_ENDPOINT  https://delaware-canvas-checkout….workers.dev

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject checkout endpoint from secrets
        env:
          CHECKOUT_ENDPOINT: ${{ secrets.CHECKOUT_ENDPOINT }}
        run: node .github/scripts/inject-checkout-endpoint.mjs

      - name: Stage site files
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude 'api' \
            --exclude '.gitignore' \
            ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
